<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Waraira · Intro Recurso 1 — máquina de escribir</title>
<style>
  :root{
    --bg:#000000;
    --ink:#f4f1e8;          /* blanco papel viejo */
    --ink-dim:#8f8a7d;      /* gris tinta apagada */
    --amber:#f5b53d;        /* sol / acento */
    --mint:#6ee7b7;         /* verde sierra sobre negro */
    --rule:#3a3630;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);overflow:hidden}
  body{
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:grid;place-items:center;
    cursor:default;
  }

  /* Encuadre para grabar en un aspecto exacto (F para cambiar) */
  .stage{
    position:relative;
    background:var(--bg);
    overflow:hidden;
    box-shadow:0 0 0 100vmax var(--bg);      /* todo lo de fuera, negro */
    display:grid;place-items:center;
  }
  /* viñeta suave para dar profundidad de "cine" */
  .stage::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 42%, transparent 55%, rgba(0,0,0,.55) 100%);
  }

  .sheet{
    width:min(72%, 60ch);
    position:relative;
    z-index:1;
  }

  /* Cabecera tipo periódico */
  .masthead{opacity:0;transition:opacity .9s ease}
  .masthead.in{opacity:1}
  .rule{border:0;border-top:1px solid var(--rule)}
  .rule.double{border-top:2px solid var(--rule);position:relative}
  .rule.double::after{content:"";position:absolute;left:0;right:0;top:3px;border-top:1px solid var(--rule)}
  .kicker{
    display:flex;justify-content:space-between;align-items:center;
    letter-spacing:.42em;text-transform:uppercase;
    font-size:calc(var(--u) * .60);
    color:var(--ink-dim);
    padding:calc(var(--u)*.55) 0;
    font-family:Georgia,serif;
  }
  .kicker .brand{color:var(--ink);letter-spacing:.5em}

  /* Cuerpo — el texto que se teclea */
  .article{
    font-size:var(--u);
    line-height:1.62;
    margin-top:calc(var(--u)*1.3);
    min-height:calc(var(--u)*10);
    text-align:left;
    font-weight:400;
    letter-spacing:.005em;
  }
  .article .kw{color:var(--ink);transition:color .8s ease .1s}
  .lit .kw.amber{color:var(--amber)}
  .lit .kw.mint{color:var(--mint)}

  /* cursor máquina de escribir */
  .caret{
    display:inline-block;width:.06em;height:1.02em;
    background:var(--amber);
    margin-left:.04em;transform:translateY(.14em);
    animation:blink 1s steps(1) infinite;
  }
  .caret.done{animation:blink 1.1s steps(1) infinite;opacity:.0;transition:opacity .6s}
  @keyframes blink{50%{opacity:0}}

  /* Sello final */
  .seal{
    position:absolute;inset:0;display:grid;place-items:center;
    z-index:2;opacity:0;pointer-events:none;
  }
  .seal.in{opacity:1;transition:opacity 1.1s ease}
  .seal-inner{display:grid;place-items:center;gap:calc(var(--u)*.55);text-align:center;transform:translateY(1.2%)}
  .mark{width:calc(var(--u)*7.2);height:auto;filter:drop-shadow(0 0 22px rgba(110,231,183,.18))}
  .mark path{stroke-dasharray:var(--len);stroke-dashoffset:var(--len)}
  .seal.draw path{transition:stroke-dashoffset 1.15s cubic-bezier(.6,.02,.2,1)}
  .seal.draw path.p2{transition-delay:.28s}
  .seal.draw path{stroke-dashoffset:0}
  .mark circle{transform:scale(0);transform-origin:206px 143px;opacity:0}
  .seal.draw circle{transition:transform .7s cubic-bezier(.34,1.56,.64,1) 1.05s,opacity .5s ease 1.05s;transform:scale(1);opacity:1}
  .wordmark{
    font-family:"Iowan Old Style",Georgia,serif;
    font-size:calc(var(--u)*2.6);
    letter-spacing:.02em;color:var(--ink);
    opacity:0;transform:translateY(.35em);
  }
  .seal.draw .wordmark{transition:opacity .8s ease 1.35s,transform .8s cubic-bezier(.2,.7,.2,1) 1.35s;opacity:1;transform:none}
  .tagline{
    letter-spacing:.46em;text-transform:uppercase;
    font-family:Georgia,serif;
    font-size:calc(var(--u)*.72);color:var(--amber);
    opacity:0;
  }
  .seal.draw .tagline{transition:opacity 1s ease 1.75s;opacity:1}
  .hairline{width:calc(var(--u)*2.4);height:1px;background:var(--rule);opacity:0}
  .seal.draw .hairline{transition:opacity 1s ease 1.65s;opacity:1}

  .article.fade{opacity:.14;transform:translateY(-2%);transition:opacity 1s ease,transform 1s ease}
  .masthead.fade{opacity:.14;transition:opacity 1s ease}

  /* HUD de controles (no se graba: ocúltalo con H) */
  .hud{
    position:fixed;left:50%;bottom:14px;transform:translateX(-50%);
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:11px;letter-spacing:.05em;color:#6b675d;
    background:rgba(0,0,0,.5);border:1px solid #222;border-radius:8px;
    padding:6px 12px;z-index:50;white-space:nowrap;
    transition:opacity .4s ease;
  }
  .hud.hide{opacity:0;pointer-events:none}
  .hud b{color:#cfcabb;font-weight:600}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="sheet">
      <header class="masthead" id="masthead">
        <hr class="rule double">
        <div class="kicker">
          <span class="brand">WARAIRA</span>
          <span>Crónica civil · Caracas</span>
        </div>
        <hr class="rule">
      </header>
      <p class="article" id="article"><span class="caret" id="caret"></span></p>
    </div>

    <div class="seal" id="seal">
      <div class="seal-inner">
        <svg class="mark" viewBox="111 109 286 290" fill="none" aria-hidden="true">
          <path class="p1" d="M137.4 378 L206 156 L274.6 378" stroke="#ecfdf5" stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
          <path class="p2" d="M237.4 356 L306 134 L374.6 356" stroke="#6ee7b7" stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="206" cy="143" r="23" fill="#fbbf24"/>
        </svg>
        <div class="wordmark">Waraira</div>
        <div class="hairline"></div>
        <div class="tagline">Entre todos, unidos.</div>
      </div>
    </div>
  </div>

  <div class="hud" id="hud">
    <b>R</b> reiniciar &nbsp;·&nbsp; <b>Espacio</b> pausar &nbsp;·&nbsp; <b>F</b> formato (<span id="fmtlabel">16:9</span>) &nbsp;·&nbsp; <b>H</b> ocultar
  </div>

<script>
(() => {
  // ---- Texto del intro, en segmentos (kw = palabra que se "enciende") ----
  const SEGMENTS = [
    {t:"Después del terremoto, miles salimos a ayudar. Eso deja dicho de qué estamos hechos. Y con eso, desde ya, lo que sigue lo hacemos nosotros. La ayuda circula como rumor, y el rumor nos divide. Pero ahora la "},
    {t:"sierra Waraira", k:"amber"},
    {t:" corta con eso: aquí lo que subes queda "},
    {t:"respaldado por los tuyos", k:"mint"},
    {t:", con punto, zona y contacto. No es una app que alguien te entrega desde arriba: es la confianza que sostenemos "},
    {t:"entre todos", k:"amber"},
    {t:", y que "},
    {t:"nadie puede quebrar", k:"mint"},
    {t:"."}
  ];

  const article = document.getElementById('article');
  const caret   = document.getElementById('caret');
  const seal    = document.getElementById('seal');
  const masthead= document.getElementById('masthead');
  const stage   = document.getElementById('stage');
  const hud     = document.getElementById('hud');
  const fmtLabel= document.getElementById('fmtlabel');

  // ---- Formato / encuadre ----
  const FORMATS = [
    {name:"16:9", w:16, h:9},
    {name:"9:16", w:9, h:16},
    {name:"1:1",  w:1, h:1},
    {name:"Lleno", w:0, h:0}
  ];
  let fmt = 0;
  function layout(){
    const f = FORMATS[fmt];
    let W, H;
    if(f.w === 0){ W = innerWidth; H = innerHeight; }
    else{
      const ar = f.w/f.h;
      W = innerWidth; H = W/ar;
      if(H > innerHeight){ H = innerHeight; W = H*ar; }
    }
    stage.style.width  = Math.round(W)+'px';
    stage.style.height = Math.round(H)+'px';
    // unidad tipográfica atada a la altura del encuadre
    stage.style.setProperty('--u', (H*0.030)+'px');
    fmtLabel.textContent = f.name;
  }
  window.addEventListener('resize', layout);

  // ---- Longitud de los trazos del sello (dibujo limpio) ----
  function prepMark(){
    document.querySelectorAll('.mark path').forEach(p=>{
      const len = p.getTotalLength();
      p.style.setProperty('--len', len);
    });
  }

  // ---- Motor de tecleo ----
  let paused=false, tokenCancel=0;
  const wait = (ms)=>new Promise(r=>{
    const id=tokenCancel;
    const step=()=>{ if(id!==tokenCancel) return; if(paused){ requestAnimationFrame(step); } else { setTimeout(r,ms); } };
    step();
  });
  const pauseFor = (ch)=>{
    if(".!".includes(ch)) return 420;
    if(":;".includes(ch)) return 300;
    if(",".includes(ch))  return 190;
    if(ch===" ") return 8;
    return 0;
  };

  async function type(){
    for(const seg of SEGMENTS){
      const span=document.createElement('span');
      if(seg.k) span.className='kw '+seg.k;
      article.insertBefore(span, caret);
      for(const ch of seg.t){
        if(tokenCancel !== runId) return;
        span.textContent += ch;
        const base = 30 + Math.random()*34;      // ritmo humano
        await wait(base + pauseFor(ch));
      }
    }
  }

  let runId=0;
  async function play(){
    const id=++runId; tokenCancel=id; paused=false;
    // reset
    article.className='article'; article.querySelectorAll('.kw').forEach(n=>n.remove());
    // limpiar nodos de texto sueltos
    [...article.childNodes].forEach(n=>{ if(n!==caret) article.removeChild(n); });
    masthead.className='masthead';
    seal.className='seal';
    caret.className='caret';
    void article.offsetWidth;

    await wait(400); if(id!==runId) return;
    masthead.classList.add('in');
    await wait(1100); if(id!==runId) return;

    await type(); if(id!==runId) return;

    // encender palabras clave
    article.classList.add('lit');
    await wait(1600); if(id!==runId) return;
    caret.classList.add('done');

    // transición al sello
    await wait(500); if(id!==runId) return;
    article.classList.add('fade');
    masthead.classList.add('fade');
    await wait(700); if(id!==runId) return;

    seal.classList.add('in');
    await wait(180); if(id!==runId) return;
    seal.classList.add('draw');
    // el sello queda en hold hasta reiniciar
  }

  // ---- Controles ----
  let hudTimer;
  function flashHud(){ hud.classList.remove('hide'); clearTimeout(hudTimer); hudTimer=setTimeout(()=>hud.classList.add('hide'),3200); }
  window.addEventListener('mousemove', flashHud);

  window.addEventListener('keydown', (e)=>{
    if(e.key==='r'||e.key==='R'){ play(); flashHud(); }
    else if(e.code==='Space'){ e.preventDefault(); paused=!paused; flashHud(); }
    else if(e.key==='f'||e.key==='F'){ fmt=(fmt+1)%FORMATS.length; layout(); flashHud(); }
    else if(e.key==='h'||e.key==='H'){ hud.classList.toggle('hide'); }
  });

  // ---- Arranque ----
  layout(); prepMark(); play(); flashHud();
})();
</script>
</body>
</html>
